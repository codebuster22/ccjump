# Fails a pull request that doesn't update CHANGELOG.md.
# Bypass with the "skip-changelog" label for non-functional PRs (CI, docs, chores).
name: changelog
on:
  pull_request:
    types: [opened, synchronize, reopened, ready_for_review, labeled, unlabeled]
jobs:
  enforce:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: dangoslen/changelog-enforcer@v3
        with:
          changeLogPath: CHANGELOG.md
          skipLabels: skip-changelog
          missingUpdateErrorMessage: >-
            No CHANGELOG.md entry found. Add a bullet under the current unreleased
            version (Added/Changed/Fixed/Removed), or apply the 'skip-changelog'
            label if this PR doesn't change the ccjump tool.
