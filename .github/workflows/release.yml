# .github/workflows/release.yml
name: release
on:
  push:
    tags: ["v*"]
permissions:
  contents: write
jobs:
  release:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: oven-sh/setup-bun@v2
      - run: bun install
      - run: bun run build
      - name: checksums
        run: cd dist && sha256sum * > SHA256SUMS
      - uses: softprops/action-gh-release@v2
        with:
          files: |
            dist/ccjump-*
            dist/SHA256SUMS
